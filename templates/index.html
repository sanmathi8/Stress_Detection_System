<!DOCTYPE html>
<html>
<head>
    <title>Stress Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">
    <h2 class="text-center mb-4">🧠 Stress Detection System</h2>

    <form action="/submit" method="POST">

        <div class="mb-3">
            <label>Enter Your Name:</label>
            <input type="text" name="name" class="form-control" required>
        </div>

        <input type="hidden" name="start_time" id="start_time">

        {% for q in questions %}
            <div class="mb-3">
                <label>{{ loop.index }}. {{ q }}</label><br>
                <input type="radio" name="q{{ loop.index0 }}" value="yes" required> Yes
                <input type="radio" name="q{{ loop.index0 }}" value="no"> No
            </div>
        {% endfor %}

        <button class="btn btn-success w-100">Submit</button>
    </form>

    <a href="/history" class="btn btn-info mt-3">📊 View History</a>
</div>

<script>
document.getElementById("start_time").value = Date.now()/1000;
</script>

</body>
</html>
