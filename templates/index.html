<!DOCTYPE html>
<html>
<head>
    <title>Stress Detection</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container mt-5">

    <!-- Heading -->
    <h1 class="text-center mb-4 gradient-text">🧠 Stress Detection System</h1>

    <!-- Form Card -->
    <div class="glass-card p-4">

        <form action="/submit" method="POST">
            <input type="hidden" name="start_time" id="start_time">

            {% for q in questions %}
                <div class="question-box mb-3 p-3">
                    <label><b>{{ loop.index }}. {{ q }}</b></label><br>

                    <input type="radio" name="q{{ loop.index0 }}" value="yes" required> Yes
                    <input type="radio" name="q{{ loop.index0 }}" value="no"> No
                </div>
            {% endfor %}

            <button class="btn btn-gradient w-100 mt-3">Submit</button>
        </form>

        <a href="/history" class="btn btn-info w-100 mt-3">📊 View History</a>

    </div>

</div>

<script>
document.getElementById("start_time").value = Date.now()/1000;
</script>

</body>
</html>
