<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white text-center">

<div class="container mt-5">

    <h2>📊 Stress Result</h2>

    <h3>{{ stress }}
        {% if stress == "High" %} 😟
        {% elif stress == "Moderate" %} 😐
        {% else %} 😊
        {% endif %}
    </h3>

    <p><b>Name:</b> {{ name }}</p>
    <p><b>Score:</b> {{ score }}/10</p>
    <p><b>Speed:</b> {{ speed }}</p>

    <h4 class="mt-4">💡 Suggestions</h4>

    {% for s in suggestions %}
        <div class="
            {% if stress == 'High' %}
                alert alert-danger
            {% elif stress == 'Moderate' %}
                alert alert-warning
            {% else %}
                alert alert-success
            {% endif %}
        ">
            {{ s }}
        </div>
    {% endfor %}

    <a href="/" class="btn btn-primary mt-3">Try Again</a>
    <a href="/history" class="btn btn-warning mt-3">View History</a>

</div>

</body>
</html>
