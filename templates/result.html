<!DOCTYPE html>
<html>
<head>
    <title>Stress Result</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container mt-5 text-center">

    <!-- Heading -->
    <h1 class="gradient-text mb-4">📊 Stress Analysis Result</h1>

    <!-- Glass Card -->
    <div class="glass-card p-4">

        <!-- Stress Level with Emoji -->
        <h2>
            {{ stress }}
            {% if stress == "High" %}
                😟
            {% elif stress == "Moderate" %}
                😐
            {% else %}
                😊
            {% endif %}
        </h2>

        <!-- Details -->
        <p class="mt-3"><b>Score:</b> {{ score }}/10</p>
        <p><b>Typing Speed:</b> {{ speed }} questions/min</p>

        <!-- Chart -->
        <canvas id="chart" width="300" height="300" class="mt-4"></canvas>

        <script>
            new Chart(document.getElementById('chart'), {
                type: 'doughnut',
                data: {
                    labels: ['Stress Score', 'Remaining'],
                    datasets: [{
                        data: [{{ score }}, {{ 10-score }}]
                    }]
                }
            });
        </script>

        <!-- 💡 Suggestions -->
        <h4 class="mt-4">💡 Suggestions</h4>

        <div class="mt-3">
            {% for s in suggestions %}
                <div class="
                    {% if stress == 'High' %}
                        alert alert-danger
                    {% elif stress == 'Moderate' %}
                        alert alert-warning
                    {% else %}
                        alert alert-success
                    {% endif %}
                    shadow-sm">
                    💡 {{ s }}
                </div>
            {% endfor %}
        </div>

        <!-- Buttons -->
        <div class="mt-4">
            <a href="/" class="btn btn-primary">🔁 Try Again</a>
            <a href="/history" class="btn btn-warning">📊 View History</a>
        </div>

    </div>

</div>

</body>
</html>
